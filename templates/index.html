<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Gym Agar.io - AI Botovi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; overflow: hidden;}
        canvas { background-color: #2c3e50; border: 2px solid #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="1000" height="800"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const socket = io();

        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let gameState = null;

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        socket.on('state', (state) => {
            gameState = state;
            draw();
        });

        function draw() {
            if (!gameState) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const px = gameState.human.x;
            const py = gameState.human.y;
            const mapW = gameState.map.width;
            const mapH = gameState.map.height;

            const offsetX = canvas.width / 2 - px;
            const offsetY = canvas.height / 2 - py;

            ctx.save();
            ctx.translate(offsetX, offsetY);

            // Crtanje granica MAPE
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, mapW, mapH);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 10;
            ctx.strokeRect(0, 0, mapW, mapH);

            // Crtanje mreže (grid)
            ctx.strokeStyle = '#ecf0f1';
            ctx.lineWidth = 1;
            for(let i = 0; i <= mapW; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, mapH); ctx.stroke();
            }
            for(let i = 0; i <= mapH; i += 50) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(mapW, i); ctx.stroke();
            }

            // Crtanje hrane
            ctx.fillStyle = '#2ecc71';
            gameState.food.forEach(f => {
                ctx.beginPath();
                ctx.arc(f[0], f[1], 5, 0, Math.PI * 2); // f[0] is X, f[1] is Y
                ctx.fill();
            });

            // Crtanje BOTOVA (Neprijatelji - Narandžasta boja)
            gameState.bots.forEach(bot => {
                ctx.fillStyle = '#e67e22'; 
                ctx.beginPath();
                ctx.arc(bot.x, bot.y, bot.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#d35400';
                ctx.lineWidth = 3;
                ctx.stroke();
            });

            // Crtanje TEBE (Plava boja)
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(px, py, gameState.human.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#2980b9';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.restore(); 

            // --- MINIMAPA ---
            const minimapSize = 150;
            const padding = 20;
            const miniX = canvas.width - minimapSize - padding;
            const miniY = canvas.height - minimapSize - padding;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(miniX, miniY, minimapSize, minimapSize);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 2;
            ctx.strokeRect(miniX, miniY, minimapSize, minimapSize);

            const scaleX = minimapSize / mapW;
            const scaleY = minimapSize / mapH;
            
            // Crtanje botova na minimapi (Crvene tačke)
            ctx.fillStyle = '#e74c3c';
            gameState.bots.forEach(bot => {
                const bMiniX = miniX + (bot.x * scaleX);
                const bMiniY = miniY + (bot.y * scaleY);
                ctx.beginPath();
                ctx.arc(bMiniX, bMiniY, 2, 0, Math.PI * 2);
                ctx.fill();
            });

            // Crtanje tebe na minimapi (Plava tačka, malo veća)
            const playerMiniX = miniX + (px * scaleX);
            const playerMiniY = miniY + (py * scaleY);
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(playerMiniX, playerMiniY, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        setInterval(() => {
            let dx = 0;
            let dy = 0;
            if (gameState) {
                dx = mouseX - (canvas.width / 2);
                dy = mouseY - (canvas.height / 2);
            }
            socket.emit('action', {dx: dx, dy: dy});
        }, 1000 / 30);
    </script>

</body>
</html>
