<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Gym Agar.io - Multiplayer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #111; overflow: hidden; }
        canvas { background-color: #2c3e50; border: 2px solid #000; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: Arial; font-weight: bold; z-index: 10;}
        .logout { color: #e74c3c; text-decoration: none; margin-left: 15px; font-size: 14px;}
        #leaderboard { position: absolute; top: 40px; left: 10px; background-color: rgba(0, 0, 0, 0.6); color: white; padding: 15px; border-radius: 8px; font-family: Arial, sans-serif; width: 180px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; pointer-events: none;}
        #leaderboard h3 { margin: 0 0 10px 0; font-size: 16px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; }
        #leaderboard ol { margin: 0; padding-left: 25px; font-size: 14px; }
        #leaderboard li { margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="ui">Igrač: {{ username }} <a href="/" class="logout">[Nazad u Meni]</a></div>
    <div id="leaderboard">
        <h3>Top 10 Igrača</h3>
        <ol id="leaderboard-list"></ol>
    </div>
    <canvas id="gameCanvas" width="1000" height="800"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const socket = io();

        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let spacePressed = false; 
        let gameState = null;

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') spacePressed = true; 
        });

        socket.on('state', (state) => {
            gameState = state;
            updateLeaderboard();
            requestAnimationFrame(draw); // Koristimo hardware-sko iscrtavanje
        });

        function updateLeaderboard() {
            if (!gameState || !gameState.l) return;
            const listHTML = gameState.l.map(p => {
                const isMe = (p.id === socket.id);
                return isMe ? `<li><strong style="color: #3498db;">${p.n} (${p.s})</strong></li>` : `<li>${p.n} (${p.s})</li>`;
            }).join('');
            document.getElementById('leaderboard-list').innerHTML = listHTML;
        }

        function draw() {
            if (!gameState) return;
            const myId = socket.id;
            const me = gameState.p[myId]; // Podaci su kompresovani na backendu (p umesto players)

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const mapW = gameState.m[0]; // m umesto map
            const mapH = gameState.m[1];

            let px = mapW / 2;
            let py = mapH / 2;
            let combinedR = 15;

            if (me && me.c.length > 0) {
                let sumX = 0, sumY = 0, sumArea = 0;
                me.c.forEach(c => {
                    let area = c[2] * c[2]; // Sada je c niz: c[0]=x, c[1]=y, c[2]=r
                    sumX += c[0] * area;
                    sumY += c[1] * area;
                    sumArea += area;
                });
                combinedR = Math.sqrt(sumArea); 
                px = sumX / sumArea; 
                py = sumY / sumArea; 
            }

            ctx.save();
            let zoom = me ? Math.max(Math.pow(15 / combinedR, 0.4), 0.1) : 0.5;
            
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(zoom, zoom);
            ctx.translate(-px, -py);

            // Mapa 
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, mapW, mapH);
            ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 10; ctx.strokeRect(0, 0, mapW, mapH);

            // OPTIMIZACIJA: BATCH RENDERING HRANE (100x brže od pojedinačnog crtanja)
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            gameState.f.forEach(f => {
                ctx.moveTo(f[0] + 5, f[1]); // Pomeri olovku na ivicu kruga pre iscrtavanja
                ctx.arc(f[0], f[1], 5, 0, Math.PI * 2); 
            });
            ctx.fill();

            // Iscrtavanje igrača
            for (let id in gameState.p) {
                let p = gameState.p[id];
                
                p.c.forEach((c, index) => {
                    ctx.beginPath();
                    ctx.arc(c[0], c[1], c[2], 0, Math.PI * 2);
                    
                    if (p.b) { // is_bot
                        ctx.fillStyle = '#e67e22'; ctx.strokeStyle = '#d35400';
                    } else if (id === myId) {
                        ctx.fillStyle = '#3498db'; ctx.strokeStyle = '#2980b9';
                    } else {
                        ctx.fillStyle = '#9b59b6'; ctx.strokeStyle = '#8e44ad';
                    }
                    
                    ctx.fill();
                    ctx.lineWidth = 3 / zoom; 
                    ctx.stroke();

                    // OPTIMIZACIJA: Izbačen `shadowBlur`. Korišćen `strokeText` za senku
                    if (index === 0) {
                        ctx.font = `bold ${14 / zoom}px Arial`;
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.lineWidth = 3 / zoom;
                        ctx.strokeStyle = "black";
                        ctx.strokeText(p.n, c[0], c[1]); // Crni obrub teksta (brza zamena za senku)
                        ctx.fillStyle = '#ffffff';
                        ctx.fillText(p.n, c[0], c[1]); // Beli tekst preko
                    }
                });
            }
            ctx.restore(); 

            // Minimapa
            const minimapSize = 150;
            const miniX = canvas.width - minimapSize - 20;
            const miniY = canvas.height - minimapSize - 20;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.fillRect(miniX, miniY, minimapSize, minimapSize);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 2; ctx.strokeRect(miniX, miniY, minimapSize, minimapSize);

            const scaleX = minimapSize / mapW;
            const scaleY = minimapSize / mapH;
            
            for (let id in gameState.p) {
                let p = gameState.p[id];
                let isMe = (id === myId);
                ctx.fillStyle = p.b ? '#e74c3c' : (isMe ? '#3498db' : '#9b59b6');
                
                // Batch crtanje na minimapi
                ctx.beginPath();
                p.c.forEach(c => {
                    ctx.moveTo(miniX + (c[0] * scaleX), miniY + (c[1] * scaleY));
                    ctx.arc(miniX + (c[0] * scaleX), miniY + (c[1] * scaleY), isMe ? 4 : 2, 0, Math.PI * 2);
                });
                ctx.fill();
            }
        }

        setInterval(() => {
            let dx = mouseX - (canvas.width / 2);
            let dy = mouseY - (canvas.height / 2);
            socket.emit('action', {dx: dx, dy: dy, split: spacePressed});
            spacePressed = false; 
        }, 1000 / 30);
    </script>
</body>
</html>
