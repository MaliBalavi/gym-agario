<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Prijava - Agar.io</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a2e; color: #fff; margin: 0; }
        .login-box { background: #16213e; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        .login-box h2 { margin-bottom: 20px; font-size: 28px; }
        input { width: 100%; padding: 12px; margin: 10px -12px; border: none; border-radius: 6px; background: #0f3460; color: white; font-size: 16px; }
        input:focus { outline: 2px solid #e94560; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .btn-login { background: #3498db; }
        .btn-login:hover { background: #2980b9; }
        .btn-register { background: #e94560; }
        .btn-register:hover { background: #d03a53; }
        .error { color: #ff6b6b; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Gym Agar.io</h2>
        
        <!-- Prikaz grešaka iz Flask-a -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Korisničko ime" required>
            <input type="password" name="password" placeholder="Lozinka" required>
            
            <div class="buttons">
                <button type="submit" name="action" value="login" class="btn-login">Prijavi se</button>
                <button type="submit" name="action" value="register" class="btn-register">Registruj se</button>
            </div>
        </form>
    </div>
</body>
</html>
